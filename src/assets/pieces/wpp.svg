<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45" width="45" height="45">
  <!-- Drop shadow under the piece -->
  <ellipse cx="22.5" cy="40" rx="14" ry="2.2" fill="#000000" opacity="0.25"/>

  <!-- Outer thick ring: large outer circle - large inner circle creates the donut hole.
       The ring itself (the body of the donut) is filled with the light cream color
       and has a dark outline. -->
  <path d="
    M 22.5,6.5
    A 16,16 0 1,0 22.5,38.5
    A 16,16 0 1,0 22.5,6.5
    Z
    M 22.5,14.5
    A 8,8 0 1,1 22.5,30.5
    A 8,8 0 1,1 22.5,14.5
    Z
  " fill="#F0D9A0" stroke="#3A2410" stroke-width="2" fill-rule="evenodd"/>

  <!-- Inner small ball, centered in the donut hole -->
  <circle cx="22.5" cy="22.5" r="5" fill="#F0D9A0" stroke="#3A2410" stroke-width="1.5"/>

  <!-- Subtle highlight on the ring (top-left, gives 3D feel) -->
  <ellipse cx="18" cy="14" rx="3.5" ry="2" fill="#FFFFFF" opacity="0.4"/>
</svg>
