<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45" width="45" height="45">
  <!-- Outer thick ring (donut): outer r=16, inner r=8 -->
  <path d="
    M 22.5,6.5
    A 16,16 0 1,0 22.5,38.5
    A 16,16 0 1,0 22.5,6.5
    Z
    M 22.5,14.5
    A 8,8 0 1,1 22.5,30.5
    A 8,8 0 1,1 22.5,14.5
    Z
  " fill="#D9B860" stroke="#1F1208" stroke-width="2.4" fill-rule="evenodd"/>

  <!-- Inner ball -->
  <circle cx="22.5" cy="22.5" r="6.5" fill="#D9B860" stroke="#1F1208" stroke-width="1.8"/>

  <!-- Subtle highlight on the ring (top-left, 3D feel) -->
  <ellipse cx="18" cy="14" rx="3.5" ry="2" fill="#FFE8A8" opacity="0.5"/>
</svg>
